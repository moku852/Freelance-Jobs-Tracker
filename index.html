<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Freelance Swipe Tracker</title>
    <style>
        :root {
            --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e;
            --border: #d1d1d6; --primary: #007aff;
            --status-todo: #8e8e93; --status-pending: #af52de;
            --status-done: #34c759;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000; --card: #1c1c1e; --text: #ffffff;
                --border: #38383a; --primary: #0a84ff;
            }
        }

        body { 
            font-family: -apple-system, system-ui; background: var(--bg); color: var(--text); 
            padding: 15px; margin: 0; overflow-x: hidden; /* 防止滑動時出現橫向滾動條 */
        }
        
        .container { max-width: 600px; margin: 0 auto; }

        /* 頂部篩選 */
        .filter-bar { 
            display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; 
            position: sticky; top: 0; background: var(--bg); z-index: 100;
        }
        .filter-btn { 
            white-space: nowrap; padding: 6px 14px; border-radius: 15px; 
            background: var(--card); border: 1px solid var(--border); 
            color: var(--text); font-size: 14px;
        }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* 輸入區 */
        .add-section { background: var(--card); padding: 15px; border-radius: 15px; margin: 10px 0 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        button.add-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; }

        /* 滑動卡片容器 */
        .job-container { position: relative; overflow: hidden; margin-bottom: 12px; border-radius: 15px; touch-action: pan-y; }
        
        /* 底層提示背景 */
        .swipe-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box; border-radius: 15px;
            font-weight: bold; color: white; font-size: 14px;
        }
        .bg-delete { background: #ff3b30; flex-direction: row; } /* 右滑刪除 */
        .bg-next { background: #34c759; flex-direction: row-reverse; } /* 左滑下一步 */

        /* 上層內容卡片 */
        .job-card { 
            position: relative; background: var(--card); padding: 18px; 
            z-index: 2; transition: transform 0.2s ease-out;
            display: flex; flex-direction: column; gap: 8px;
            border-left: 6px solid var(--status-todo);
        }

        .job-title { font-size: 18px; font-weight: 600; }
        .tag-group { display: flex; gap: 8px; }
        .tag { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        
        .status-未完成 { background: #636366; color: white; }
        .status-待確認-修改 { background: #af52de; color: white; }
        .status-已完成 { background: #34c759; color: white; }
        .pay-未收錢 { border: 1px solid #ff9500; color: #ff9500; }
        .pay-已收錢 { background: #34c75922; color: #34c759; border: 1px solid #34c759; }
    </style>
</head>
<body>

<div class="container">
    <h2>Job Tracker ⚡️</h2>

    <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" onclick="setFilter('全部', this)">全部</button>
        <button class="filter-btn" onclick="setFilter('未收錢', this)">未收錢 ❌</button>
        <button class="filter-btn" onclick="setFilter('已完成', this)">已完成</button>
    </div>
    
    <div class="add-section">
        <input type="text" id="jobName" placeholder="輸入 Job 名稱..." onkeypress="if(event.key==='Enter')addJob()">
        <button class="add-btn" onclick="addJob()">新增項目</button>
    </div>

    <div id="jobList"></div>
</div>

<script>
    let jobs = JSON.parse(localStorage.getItem('f-jobs-swipe')) || [];
    let currentFilter = '全部';
    const workStates = ["未完成", "待確認/修改", "已完成"];
    const payStates = ["未收錢", "已收錢"];

    function save() {
        localStorage.setItem('f-jobs-swipe', JSON.stringify(jobs));
        render();
    }

    function setFilter(f, btn) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function addJob() {
        const input = document.getElementById('jobName');
        if (!input.value) return;
        jobs.unshift({ id: Date.now(), name: input.value, work: 0, pay: 0 });
        input.value = '';
        save();
    }

    // --- 滑動邏輯 ---
    let startX = 0;
    let currentId = null;

    function handleStart(e, id) {
        startX = e.touches[0].clientX;
        currentId = id;
    }

    function handleMove(e, el) {
        let touchX = e.touches[0].clientX;
        let diff = touchX - startX;
        // 限制滑動距離
        if (Math.abs(diff) < 150) {
            el.style.transform = `translateX(${diff}px)`;
        }
    }

    function handleEnd(e, id, el) {
        let diff = e.changedTouches[0].clientX - startX;
        el.style.transform = `translateX(0px)`; // 重置位置

        if (diff > 100) { // 向右滑：刪除
            if(confirm('刪除項目？')) {
                jobs = jobs.filter(j => j.id !== id);
                save();
            }
        } else if (diff < -100) { // 向左滑：下一個階段
            const job = jobs.find(j => j.id === id);
            job.work = (job.work + 1) % workStates.length;
            save();
        }
    }

    function togglePay(id) {
        const job = jobs.find(j => j.id === id);
        job.pay = (job.pay + 1) % payStates.length;
        save();
    }

    function render() {
        const list = document.getElementById('jobList');
        const filtered = jobs.filter(j => {
            if (currentFilter === '全部') return true;
            if (currentFilter === '未收錢') return payStates[j.pay] === '未收錢';
            return workStates[j.work] === currentFilter;
        });

        list.innerHTML = filtered.map(job => {
            const wStatus = workStates[job.work];
            const pStatus = payStates[job.pay];
            const borderCol = job.work === 2 ? '#34c759' : (job.work === 1 ? '#af52de' : '#8e8e93');

            return `
                <div class="job-container">
                    <div class="swipe-bg bg-delete"><span>🗑 刪除</span></div>
                    <div class="swipe-bg bg-next"><span>➡️ 下一階段</span></div>
                    <div class="job-card" 
                         style="border-left-color: ${borderCol}"
                         ontouchstart="handleStart(event, ${job.id})"
                         ontouchmove="handleMove(event, this)"
                         ontouchend="handleEnd(event, ${job.id}, this)">
                        <span class="job-title">${job.name}</span>
                        <div class="tag-group">
                            <span class="tag status-${wStatus.replace('/','-')}">${wStatus}</span>
                            <span class="tag pay-${pStatus}" onclick="togglePay(${job.id})">${pStatus}</span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    render();
</script>

</body>
</html>
