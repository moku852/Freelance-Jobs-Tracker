<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Job Tracker App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 禁止頁面左右晃動，增加手機 App 感 */
        body { 
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: contain;
        }
        
        @media (prefers-color-scheme: dark) {
            body { background-color: #0f172a; color: #f1f5f9; }
            .card { background-color: #1e293b; border-color: #334155; }
            .input-box { background-color: #334155; color: white; border-color: #475569; }
            .status-tag { background-color: rgba(255,255,255,0.05); }
        }

        /* 隱藏滾動條但保留功能 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 transition-colors duration-300 min-h-screen font-sans">
    
    <header class="py-6 mb-2">
        <h1 class="text-2xl font-black tracking-tight">工作進度記本</h1>
        <p class="text-xs opacity-50">Freelance Workflow Tracker</p>
    </header>

    <div class="card p-5 rounded-3xl border mb-8 shadow-xl bg-white transition-all">
        <div class="flex flex-col gap-3">
            <input type="text" id="jobName" placeholder="輸入工作名稱..." 
                class="input-box w-full border rounded-2xl px-4 py-4 text-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 border-gray-200">
            
            <div class="flex gap-2">
                <select id="jobStatus" 
                    class="input-box flex-1 border rounded-2xl px-4 py-4 text-base cursor-pointer bg-gray-50 border-gray-200 appearance-none">
                    <option value="doing">📝 進行中</option>
                    <option value="pending">⏳ 待確認/修改</option>
                    <option value="done-unpaid">✅ 已完成(待收)</option>
                    <option value="finished">🎉 全部完成</option>
                </select>
                <button onclick="addJob()" 
                    class="bg-blue-600 active:scale-95 text-white font-bold px-6 rounded-2xl transition-all shadow-lg">
                    新增
                </button>
            </div>
        </div>
    </div>

    <div class="space-y-10 pb-20">
        <section>
            <h2 class="text-sm font-bold uppercase tracking-widest text-blue-500 mb-3 ml-1 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-blue-500 rounded-full"></span> 進行中
            </h2>
            <div id="doing-list" class="space-y-3"></div>
        </section>

        <section>
            <h2 class="text-sm font-bold uppercase tracking-widest text-yellow-500 mb-3 ml-1 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-yellow-500 rounded-full"></span> 待確認 / 修改
            </h2>
            <div id="pending-list" class="space-y-3"></div>
        </section>

        <section>
            <h2 class="text-sm font-bold uppercase tracking-widest text-red-500 mb-3 ml-1 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-red-500 rounded-full"></span> 已完成 (待收款)
            </h2>
            <div id="done-unpaid-list" class="space-y-3"></div>
        </section>

        <section>
            <h2 class="text-sm font-bold uppercase tracking-widest text-green-500 mb-3 ml-1 flex items-center gap-2">
                <span class="w-1.5 h-4 bg-green-500 rounded-full"></span> 全部完成
            </h2>
            <div id="finished-list" class="space-y-3"></div>
        </section>
    </div>

    <script>
        let jobs = JSON.parse(localStorage.getItem('phoneJobs')) || [];

        function render() {
            const containers = {
                'doing': document.getElementById('doing-list'),
                'pending': document.getElementById('pending-list'),
                'done-unpaid': document.getElementById('done-unpaid-list'),
                'finished': document.getElementById('finished-list')
            };

            Object.values(containers).forEach(c => c.innerHTML = '');

            jobs.forEach((job, index) => {
                const item = document.createElement('div');
                item.className = 'card p-5 rounded-2xl border shadow-sm flex flex-col gap-3 active:bg-gray-50 dark:active:bg-gray-800 transition-colors';
                item.innerHTML = `
                    <div class="flex justify-between items-start">
                        <p class="font-bold text-lg leading-tight flex-1 pr-4">${job.name}</p>
                        <button onclick="deleteJob(${index})" class="p-2 -mr-2 text-gray-300 hover:text-red-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                    <button onclick="moveJob(${index})" class="w-full bg-gray-100 dark:bg-slate-700 py-3 rounded-xl font-bold text-sm text-blue-600 dark:text-blue-300 active:scale-95 transition-all">
                        變更狀態 ➔
                    </button>
                `;
                containers[job.status].appendChild(item);
            });
            localStorage.setItem('phoneJobs', JSON.stringify(jobs));
        }

        function addJob() {
            const el = document.getElementById('jobName');
            const status = document.getElementById('jobStatus').value;
            if (!el.value.trim()) return;
            jobs.push({ name: el.value, status: status });
            el.value = '';
            render();
        }

        function moveJob(index) {
            const flow = ['doing', 'pending', 'done-unpaid', 'finished'];
            let next = (flow.indexOf(jobs[index].status) + 1) % 4;
            jobs[index].status = flow[next];
            render();
        }

        function deleteJob(index) {
            if(confirm('刪除此紀錄？')) {
                jobs.splice(index, 1);
                render();
            }
        }

        render();
    </script>
</body>
</html>
