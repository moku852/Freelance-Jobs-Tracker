<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Freelance Hybrid Tracker</title>
    <style>
        :root {
            --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e;
            --border: #d1d1d6; --primary: #007aff;
            --status-todo: #636366; --status-pending: #af52de;
            --status-done: #34c759;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000; --card: #1c1c1e; --text: #ffffff;
                --border: #38383a; --primary: #0a84ff;
            }
        }

        body { 
            font-family: -apple-system, system-ui; background: var(--bg); color: var(--text); 
            padding: 15px; margin: 0; overflow-x: hidden;
        }
        
        .container { max-width: 600px; margin: 0 auto; }

        .filter-bar { 
            display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; 
            position: sticky; top: 0; background: var(--bg); z-index: 100;
            scrollbar-width: none;
        }
        .filter-bar::-webkit-scrollbar { display: none; }

        .filter-btn { 
            white-space: nowrap; padding: 8px 16px; border-radius: 20px; 
            background: var(--card); border: 1px solid var(--border); 
            color: var(--text); font-size: 14px; cursor: pointer;
        }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .add-section { background: var(--card); padding: 15px; border-radius: 15px; margin: 10px 0 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        button.add-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; }

        .job-container { position: relative; overflow: hidden; margin-bottom: 12px; border-radius: 15px; touch-action: pan-y; }
        
        .swipe-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; padding: 0 20px; box-sizing: border-box;
            font-weight: bold; color: white; font-size: 14px;
        }
        .bg-delete { background: #ff3b30; justify-content: flex-start; }
        .bg-next { background: #34c759; justify-content: flex-end; }

        .job-card { 
            position: relative; background: var(--card); padding: 18px; 
            z-index: 2; transition: transform 0.2s ease-out;
            display: flex; flex-direction: column; gap: 8px;
            border-left: 6px solid var(--status-todo);
        }

        .job-title { font-size: 18px; font-weight: 600; }
        .tag-group { display: flex; gap: 8px; z-index: 10; }
        .tag { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; cursor: pointer; }
        
        .status-未完成 { background: #636366; color: white; }
        .status-待確認-修改 { background: #af52de; color: white; }
        .status-已完成 { background: #34c759; color: white; }
        .pay-未收錢 { border: 1px solid #ff9500; color: #ff9500; }
        .pay-已收錢 { background: #34c75922; color: #34c759; border: 1px solid #34c759; }
    </style>
</head>
<body>

<div class="container">
    <h2>Job Tracker ⚡️</h2>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('全部', this)">全部</button>
        <button class="filter-btn" onclick="setFilter('未完成', this)">未完成</button>
        <button class="filter-btn" onclick="setFilter('待確認/修改', this)">待確認/修改</button>
        <button class="filter-btn" onclick="setFilter('已完成', this)">已完成</button>
        <button class="filter-btn" onclick="setFilter('未收錢', this)">未收錢 ❌</button>
        <button class="filter-btn" onclick="setFilter('已收錢', this)">已收錢 ✅</button>
    </div>
    
    <div class="add-section">
        <input type="text" id="jobName" placeholder="輸入 Job 名稱..." onkeypress="if(event.key==='Enter')addJob()">
        <button class="add-btn" onclick="addJob()">新增項目</button>
    </div>

    <div id="jobList"></div>
</div>

<script>
   // ⚠️ 填入你啱啱複製嘅 Google App Script URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyqLk5-4eX1tNSVei-l2lTP4HxaFssaG6Elqu6TaL_Hlxm7hEiDAyHvFcrRM1bx4I2DNw/exec";

let jobs = [];
let currentFilter = '全部';
const workStates = ["未完成", "待確認/修改", "已完成"];
const payStates = ["未收錢", "已收錢"];

// 從 Google Sheet 讀取資料
async function loadFromCloud() {
    try {
        const response = await fetch(SCRIPT_URL);
        jobs = await response.json();
        render();
    } catch (e) {
        console.log("讀取失敗，嘗試載入本地備份");
        jobs = JSON.parse(localStorage.getItem('f-jobs-backup')) || [];
        render();
    }
}

// 同步到 Google Sheet
async function syncToCloud() {
    localStorage.setItem('f-jobs-backup', JSON.stringify(jobs)); // 本地先留備份
    render(); 
    await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(jobs)
    });
}

function addJob() {
    const input = document.getElementById('jobName');
    if (!input.value) return;
    jobs.unshift({ id: Date.now(), name: input.value, work: 0, pay: 0 });
    input.value = '';
    syncToCloud();
}

function toggleWork(id) {
    const job = jobs.find(j => j.id === id);
    job.work = (job.work + 1) % workStates.length;
    syncToCloud();
}

function togglePay(id) {
    const job = jobs.find(j => j.id === id);
    job.pay = (job.pay + 1) % payStates.length;
    syncToCloud();
}

function deleteJob(id) {
    if(confirm('確定刪除？')) {
        jobs = jobs.filter(j => j.id !== id);
        syncToCloud();
    }
}

// 滑動邏輯與 Render 部分保持不變，但 handleEnd 內調用 syncToCloud()
function handleEnd(e, id, el) {
    let diff = e.changedTouches[0].clientX - startX;
    el.style.transform = `translateX(0px)`;
    if (diff > 100) {
        deleteJob(id);
    } else if (diff < -100) {
        const job = jobs.find(j => j.id === id);
        if (job.work < 2) job.work++; else job.pay = 1;
        syncToCloud();
    }
}

// 頁面加載時自動讀取雲端資料
loadFromCloud();
</script>

</body>
</html>
