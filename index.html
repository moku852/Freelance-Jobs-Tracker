<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Freelance Pro Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e;
            --border: #d1d1d6; --primary: #007aff;
            --status-todo: #636366; --status-pending: #af52de;
            --status-done: #34c759;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000; --card: #1c1c1e; --text: #ffffff;
                --border: #38383a; --primary: #0a84ff;
            }
        }

        body { 
            font-family: -apple-system, system-ui; background: var(--bg); color: var(--text); 
            padding: 15px; margin: 0; overflow-x: hidden;
        }
        
        .container { max-width: 600px; margin: 0 auto; }

        .filter-bar { 
            display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; 
            position: sticky; top: 0; background: var(--bg); z-index: 100;
            scrollbar-width: none;
        }
        .filter-bar::-webkit-scrollbar { display: none; }

        .filter-btn { 
            white-space: nowrap; padding: 8px 16px; border-radius: 20px; 
            background: var(--card); border: 1px solid var(--border); 
            color: var(--text); font-size: 14px; cursor: pointer;
        }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .add-section { background: var(--card); padding: 15px; border-radius: 15px; margin: 10px 0 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input.new-job { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        button.add-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; }

        /* 拖拽時的樣式 */
        .sortable-ghost { opacity: 0.4; background: var(--primary) !important; }

        .job-container { position: relative; overflow: hidden; margin-bottom: 12px; border-radius: 15px; touch-action: none; }
        
        .swipe-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; padding: 0 20px; box-sizing: border-box;
            font-weight: bold; color: white; font-size: 14px;
        }
        .bg-delete { background: #ff3b30; justify-content: flex-start; }
        .bg-next { background: #34c759; justify-content: flex-end; }

        .job-card { 
            position: relative; background: var(--card); padding: 18px; 
            z-index: 2; transition: transform 0.2s ease-out;
            display: flex; flex-direction: column; gap: 8px;
            border-left: 6px solid var(--status-todo);
            cursor: grab;
        }

        /* 編輯標題的輸入框樣式 */
        .edit-input {
            font-size: 18px; font-weight: 600; background: transparent;
            border: 1px dashed var(--primary); color: var(--text);
            width: 100%; padding: 2px 5px; border-radius: 4px;
        }

        .job-title { font-size: 18px; font-weight: 600; display: block; min-height: 24px; }
        .tag-group { display: flex; gap: 8px; z-index: 10; }
        .tag { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; cursor: pointer; }
        
        .status-未完成 { background: #636366; color: white; }
        .status-待確認-修改 { background: #af52de; color: white; }
        .status-已完成 { background: #34c759; color: white; }
        .pay-未收錢 { border: 1px solid #ff9500; color: #ff9500; }
        .pay-已收錢 { background: #34c75922; color: #34c759; border: 1px solid #34c759; }
    </style>
</head>
<body>

<div class="container">
    <h2>Job Tracker ⚡️</h2>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('全部', this)">全部</button>
        <button class="filter-btn" onclick="setFilter('未完成', this)">未完成</button>
        <button class="filter-btn" onclick="setFilter('待確認/修改', this)">待確認/修改</button>
        <button class="filter-btn" onclick="setFilter('已完成', this)">已完成</button>
        <button class="filter-btn" onclick="setFilter('未收錢', this)">未收錢 ❌</button>
        <button class="filter-btn" onclick="setFilter('已收錢', this)">已收錢 ✅</button>
    </div>
    
    <div class="add-section">
        <input type="text" id="jobName" class="new-job" placeholder="輸入 Job 名稱..." onkeypress="if(event.key==='Enter')addJob()">
        <button class="add-btn" onclick="addJob()">新增項目</button>
    </div>

    <div id="jobList"></div>
</div>

<script>
    let jobs = JSON.parse(localStorage.getItem('f-jobs-v6')) || [];
    let currentFilter = '全部';
    const workStates = ["未完成", "待確認/修改", "已完成"];
    const payStates = ["未收錢", "已收錢"];

    function save() {
        localStorage.setItem('f-jobs-v6', JSON.stringify(jobs));
        render();
    }

    function setFilter(f, btn) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function addJob() {
        const input = document.getElementById('jobName');
        if (!input.value) return;
        jobs.unshift({ id: Date.now(), name: input.value, work: 0, pay: 0 });
        input.value = '';
        save();
    }

    // 修改名稱功能
    function editTitle(id, newName) {
        const job = jobs.find(j => j.id === id);
        if (job) {
            job.name = newName;
            save();
        }
    }

    function toggleWork(id) {
        const job = jobs.find(j => j.id === id);
        job.work = (job.work + 1) % workStates.length;
        save();
    }

    function togglePay(id) {
        const job = jobs.find(j => j.id === id);
        job.pay = (job.pay + 1) % payStates.length;
        save();
    }

    // 手勢操作
    let startX = 0;
    function handleStart(e) { startX = e.touches[0].clientX; }
    function handleMove(e, el) {
        let diff = e.touches[0].clientX - startX;
        if (Math.abs(diff) < 150) el.style.transform = `translateX(${diff}px)`;
    }
    function handleEnd(e, id, el) {
        let diff = e.changedTouches[0].clientX - startX;
        el.style.transform = `translateX(0px)`;
        if (diff > 100) {
            if(confirm('確定刪除？')) {
                jobs = jobs.filter(j => j.id !== id);
                save();
            }
        } else if (diff < -100) {
            const job = jobs.find(j => j.id === id);
            if (job.work < 2) job.work++; else job.pay = 1;
            save();
        }
    }

    function render() {
        const list = document.getElementById('jobList');
        const filtered = jobs.filter(j => {
            if (currentFilter === '全部') return true;
            if (currentFilter === '未收錢') return payStates[j.pay] === '未收錢';
            if (currentFilter === '已收錢') return payStates[j.pay] === '已收錢';
            return workStates[j.work] === currentFilter;
        });

        list.innerHTML = filtered.map(job => {
            const wStatus = workStates[job.work];
            const pStatus = payStates[job.pay];
            const borderCol = job.work === 2 ? '#34c759' : (job.work === 1 ? '#af52de' : '#636366');

            return `
                <div class="job-container" data-id="${job.id}">
                    <div class="swipe-bg bg-delete"><span>🗑 刪除</span></div>
                    <div class="swipe-bg bg-next"><span>下一步 ➡️</span></div>
                    <div class="job-card" 
                         style="border-left-color: ${borderCol}"
                         ontouchstart="handleStart(event)"
                         ontouchmove="handleMove(event, this)"
                         ontouchend="handleEnd(event, ${job.id}, this)">
                        <span class="job-title" onclick="makeEditable(this, ${job.id})">${job.name}</span>
                        <div class="tag-group">
                            <span class="tag status-${wStatus.replace('/','-')}" onclick="toggleWork(${job.id})">${wStatus}</span>
                            <span class="tag pay-${pStatus}" onclick="togglePay(${job.id})">${pStatus}</span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        // 初始化拖拽功能 (僅在顯示「全部」時啟用拖拽，避免排序混亂)
        if (currentFilter === '全部') {
            new Sortable(list, {
                animation: 150,
                ghostClass: 'sortable-ghost',
                delay: 400, // 長按 400ms 觸發拖拽，防止與滑動衝突
                delayOnTouchOnly: true,
                onEnd: function() {
                    const newOrder = Array.from(list.querySelectorAll('.job-container')).map(el => parseInt(el.getAttribute('data-id')));
                    jobs.sort((a, b) => newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
                    localStorage.setItem('f-jobs-v6', JSON.stringify(jobs));
                }
            });
        }
    }

    // 點擊變為可編輯輸入框
    function makeEditable(el, id) {
        const currentName = el.innerText;
        const input = document.createElement('input');
        input.value = currentName;
        input.className = 'edit-input';
        input.onblur = () => editTitle(id, input.value);
        input.onkeypress = (e) => { if(e.key === 'Enter') editTitle(id, input.value); };
        el.innerHTML = '';
        el.appendChild(input);
        input.focus();
    }

    render();
</script>

</body>
</html>
